<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Script Maker for Creative Dummies</title>

<link href="https://cdn.jsdelivr.net/npm/quill@2/dist/quill.snow.css" rel="stylesheet">

<style>

body{
margin:0;
font-family:Arial;
background:#f3f3f3;
}

header{
background:#111;
color:white;
padding:20px;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

#editor{
height:600px;
background:white;
}

</style>

</head>

<body>

<header>

<h1>Script Maker for Creative Dummies</h1>
<p>Professional screenplay writing without the pain.</p>

</header>

<div class="container">

<div id="editor"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/quill@2/dist/quill.js"></script>

<script>

const quill = new Quill('#editor', {
theme: 'snow',
modules:{
toolbar:[
['bold','italic','underline'],
[{ 'header':[1,2,false]}],
[{ 'list':'ordered'},{'list':'bullet'}],
['clean']
]
}
});

</script>

</body>
</html>
