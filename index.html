<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Script Maker for Creative Dummies</title>
<style>
:root{--bg:#e5e7eb;--panel:#fff;--border:#d1d5db;--text:#111827;--muted:#6b7280;--accent:#111827;--soft:#f9fafb}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text)}
button,input,textarea,select{font:inherit}
button{border:1px solid var(--border);background:#fff;padding:8px 12px;border-radius:10px;cursor:pointer}
button:hover{background:#f3f4f6} button.primary{background:var(--accent);color:#fff;border-color:var(--accent)} button.small{font-size:12px;padding:6px 10px}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;background:#111827;color:#fff;position:sticky;top:0;z-index:30}
.workspace{display:grid;grid-template-columns:240px 1fr 270px;gap:16px;padding:16px;align-items:start}
.panel{background:var(--panel);border-radius:12px;border:1px solid var(--border);padding:14px}
.panel h3{margin:0 0 8px}.muted{font-size:12px;color:var(--muted)}
.canvas-wrap{display:flex;justify-content:center;align-items:flex-start}
#pagesContainer{width:min(8.5in,100%);display:flex;flex-direction:column;gap:18px}
.page-shell{background:#f3f4f6;border-radius:10px;padding:8px;box-shadow:0 12px 30px rgba(0,0,0,.08)}
.page-meta{font-size:12px;color:var(--muted);margin:0 0 8px 4px;display:flex;justify-content:space-between}
.page{width:8.5in;background:white;min-height:11in;padding-top:1in;padding-right:1in;padding-bottom:1in;padding-left:1.5in;box-shadow:0 18px 40px rgba(0,0,0,.15);position:relative}
.page-content{font-family:"Courier New",monospace;font-size:12pt;line-height:1.2;min-height:9in}
.scene-block{position:relative;margin-bottom:.3in;border-radius:8px}
.scene-block:hover{background:#eef2ff}
.scene-hover{position:absolute;right:-120px;top:0;display:none;flex-direction:column;gap:6px}.scene-block:hover .scene-hover{display:flex}.scene-hover button{font-size:11px}
.script-line{margin-bottom:.12in;white-space:pre-wrap;max-width:6in}
.sp-heading{text-transform:uppercase;font-weight:bold}.sp-character{text-transform:uppercase;margin-left:2.2in;max-width:2.3in}.sp-dialogue{margin-left:1.2in;max-width:3.5in}.sp-parenthetical{margin-left:1.7in;max-width:3in}.sp-transition{text-transform:uppercase;text-align:right;margin-left:4in;max-width:1.7in}.scene-number-badge{position:absolute;left:-1.1in;top:0;font-family:Arial,Helvetica,sans-serif;font-size:11px;color:#6b7280;font-weight:bold}
.add-scene{border:2px dashed #cbd5e1;padding:14px;text-align:center;margin-top:10px;cursor:pointer;border-radius:12px;background:#fafafa}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;padding:16px;z-index:60}.modal{background:white;width:940px;max-height:92vh;overflow:auto;border-radius:14px;padding:20px}
.section{margin-bottom:18px}.section-title{font-weight:bold;margin-bottom:6px}.help{font-size:12px;color:var(--muted);margin-bottom:8px}.block{border:1px solid var(--border);border-radius:10px;padding:10px;margin-bottom:10px}
.grid3{display:grid;grid-template-columns:160px 1fr 180px;gap:10px}.field,textarea,select{width:100%;border:1px solid var(--border);border-radius:10px;padding:10px}.block textarea{min-height:84px}.inline-help{font-size:11px;color:var(--muted);margin-top:6px}.suggestions{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}.suggestion-chip{border:1px solid #cbd5e1;background:#f8fafc;border-radius:999px;padding:4px 8px;font-size:11px;cursor:pointer}.suggestion-chip:hover{background:#eef2ff}
#sceneList>div{margin-bottom:8px;padding:8px;border:1px solid var(--border);border-radius:10px;background:#fff}.scene-list-actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
#glossary .g-item{padding:8px 0;border-bottom:1px solid #eee;font-size:12px}
@media (max-width:1320px){.workspace{grid-template-columns:1fr}.scene-hover{right:0;top:-34px;flex-direction:row}#pagesContainer,.page{width:100%}.page{min-height:auto;padding:32px 24px}.scene-number-badge{position:static;display:block;margin-bottom:8px}}
@media print{body *{visibility:hidden}.canvas-wrap,.canvas-wrap *{visibility:visible}.topbar,.panel,.add-scene,.scene-hover,.page-meta{display:none !important}.workspace{display:block;padding:0}.canvas-wrap{display:block}.page-shell{padding:0;box-shadow:none;background:transparent;break-after:page}.page{box-shadow:none;margin:0;min-height:11in;padding-top:1in;padding-right:1in;padding-bottom:1in;padding-left:1.5in}}
</style>
</head>
<body>
<header class="topbar">
<div><strong>Script Maker for Creative Dummies</strong><br><small>Editor visual sobre página de guion</small></div>
<div>
<button onclick="newDocument()">Nuevo</button>
<button onclick="openSceneModal('new')">Agregar escena</button>
<button onclick="exportTXT()">Exportar TXT</button>
<button onclick="window.print()">PDF</button>
</div>
</header>

<main class="workspace">
<section class="panel">
<h3>Escenas</h3>
<p class="muted">Numeración automática y acceso rápido.</p>
<div id="sceneList"></div>
<button class="primary" onclick="openSceneModal('new')">+ Nueva escena</button>
</section>

<section class="canvas-wrap">
<div id="pagesContainer"></div>
</section>

<section class="panel">
<h3>Glosario</h3>
<p class="muted">Lista completa de abreviaturas para aprender.</p>
<div id="glossary"></div>
</section>
</main>

<div id="modal" class="modal-overlay">
<div class="modal">
<h2 id="modalTitle">Editar escena</h2>
<div id="modalBody"></div>
<div style="margin-top:12px;display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap">
<span class="muted">Cada campo ahora incluye guías y sugerencias.</span>
<div>
<button onclick="closeModal()">Cancelar</button>
<button class="primary" onclick="saveScene()">Guardar escena</button>
</div>
</div>
</div>
</div>

<script>
const HEADING_TYPES=["INT.","EXT.","INT./EXT."]
const TIMES=["DAY","NIGHT","MORNING","EVENING","CONTINUOUS"]
const CHARACTER_SUFFIXES=[
{v:"",d:"sin sufijo"},
{v:"(V.O.)",d:"voz en off"},
{v:"(O.S.)",d:"fuera de pantalla"},
{v:"(CONT'D)",d:"continúa hablando"}
]
const TRANSITIONS=[
{v:"CUT TO:",d:"corte directo"},
{v:"DISSOLVE TO:",d:"disolvencia"},
{v:"SMASH CUT TO:",d:"corte abrupto"},
{v:"FADE IN:",d:"inicio de guion"},
{v:"FADE OUT.",d:"fin de guion"}
]
const GLOSSARY=[
"INT. — interior","EXT. — exterior","INT./EXT. — interior/exterior","(V.O.) — voz en off","(O.S.) — fuera de pantalla","(CONT'D) — continúa hablando","CUT TO: — corte directo","DISSOLVE TO: — disolvencia","SMASH CUT TO: — corte abrupto","FADE IN: — inicio de guion","FADE OUT. — fin de guion"
]
let state={scenes:[]}
let modalScene=null
let editingMode='new'

function uid(){return Math.random().toString(36).slice(2)}
function clone(o){return JSON.parse(JSON.stringify(o))}
function newDocument(){
state.scenes=[{
id:uid(),heading:{type:"EXT.",location:"CITY STREET",time:"NIGHT"},description:"The street is empty.",blocks:[
{id:uid(),type:"action",text:"John walks into the street."},
{id:uid(),type:"character",name:"JOHN",suffix:""},
{id:uid(),type:"dialogue",text:"I shouldn't be here."}
]},{
id:uid(),heading:{type:"INT.",location:"NEWSROOM",time:"DAY"},description:"The newsroom is quiet.",blocks:[
{id:uid(),type:"character",name:"EDITOR",suffix:""},
{id:uid(),type:"dialogue",text:"Give me page one before the coffee gets cold."}
]}]
render()
}
function headingString(s){return `${s.heading.type} ${s.heading.location} - ${s.heading.time}`}
function collectCharacterNames(excludeBlockId=null){
const names=[]
state.scenes.forEach(sc=>sc.blocks.forEach(b=>{if(b.type==='character'&&b.name&&b.id!==excludeBlockId&&!names.includes(b.name))names.push(b.name)}))
if(modalScene){modalScene.blocks.forEach(b=>{if(b.type==='character'&&b.name&&b.id!==excludeBlockId&&!names.includes(b.name))names.push(b.name)})}
return names.sort()
}
function estimateSceneLines(scene){
let lines=0
lines+=2 // heading + gap
if(scene.description) lines += Math.max(1, Math.ceil(scene.description.length/65))+1
scene.blocks.forEach(b=>{
if(b.type==='action') lines += Math.max(1, Math.ceil((b.text||'').length/65))+1
if(b.type==='character') lines += 1
if(b.type==='dialogue') lines += Math.max(1, Math.ceil((b.text||'').length/38))+1
if(b.type==='parenthetical') lines += Math.max(1, Math.ceil((b.text||'').length/32))+1
if(b.type==='transition') lines += 1
})
lines+=1
return lines
}
function paginateScenes(){
const maxLines=52
const pages=[]
let current=[]
let currentLines=0
state.scenes.forEach((scene,idx)=>{
const needed=estimateSceneLines(scene)
if(current.length && currentLines+needed>maxLines){pages.push(current);current=[];currentLines=0}
current.push({scene,sceneNumber:idx+1})
currentLines+=needed
})
if(current.length) pages.push(current)
return pages
}
function render(){renderScenes();renderPages();renderGlossary()}
function renderScenes(){
const el=document.getElementById('sceneList'); el.innerHTML=''
state.scenes.forEach((s,i)=>{
const d=document.createElement('div')
d.innerHTML=`<strong>${i+1}. ${escapeHtml(headingString(s))}</strong><div class="muted">Escena ${i+1}</div>`
const actions=document.createElement('div'); actions.className='scene-list-actions'
actions.appendChild(miniBtn('Editar',()=>openSceneModal('edit',s.id)))
actions.appendChild(miniBtn('↑',()=>moveScene(s.id,-1)))
actions.appendChild(miniBtn('↓',()=>moveScene(s.id,1)))
actions.appendChild(miniBtn('Eliminar',()=>deleteScene(s.id)))
d.appendChild(actions)
el.appendChild(d)
})
}
function miniBtn(label,fn){const b=document.createElement('button');b.className='small';b.textContent=label;b.onclick=fn;return b}
function moveScene(id,dir){const i=state.scenes.findIndex(s=>s.id===id);const j=i+dir;if(i<0||j<0||j>=state.scenes.length)return;[state.scenes[i],state.scenes[j]]=[state.scenes[j],state.scenes[i]];render()}
function deleteScene(id){if(state.scenes.length===1)return;state.scenes=state.scenes.filter(s=>s.id!==id);render()}
function renderPages(){
const container=document.getElementById('pagesContainer'); container.innerHTML=''
const pages=paginateScenes()
pages.forEach((pageScenes,pageIndex)=>{
const shell=document.createElement('div'); shell.className='page-shell'
const meta=document.createElement('div'); meta.className='page-meta'; meta.innerHTML=`<span>Página ${pageIndex+1}</span><span>1 página ≈ 1 minuto de acción</span>`
const page=document.createElement('div'); page.className='page'
const content=document.createElement('div'); content.className='page-content'
pageScenes.forEach(({scene,sceneNumber},localIndex)=>{
const wrap=document.createElement('div'); wrap.className='scene-block'
const hover=document.createElement('div'); hover.className='scene-hover'
hover.appendChild(miniBtn('Editar',()=>openSceneModal('edit',scene.id)))
wrap.appendChild(hover)
const badge=document.createElement('div'); badge.className='scene-number-badge'; badge.textContent=`SCENE ${sceneNumber}`; wrap.appendChild(badge)
appendLine(wrap,headingString(scene),'sp-heading')
appendLine(wrap,scene.description||'')
scene.blocks.forEach(b=>{
if(b.type==='action')appendLine(wrap,b.text||'')
if(b.type==='character')appendLine(wrap,[b.name,b.suffix].filter(Boolean).join(' '),'sp-character')
if(b.type==='dialogue')appendLine(wrap,b.text||'','sp-dialogue')
if(b.type==='parenthetical')appendLine(wrap,b.text||'','sp-parenthetical')
if(b.type==='transition')appendLine(wrap,b.value||'','sp-transition')
})
if(pageIndex===pages.length-1 && localIndex===pageScenes.length-1){
const add=document.createElement('div'); add.className='add-scene'; add.textContent='+ Agregar escena'; add.onclick=()=>openSceneModal('new'); wrap.appendChild(add)
}
content.appendChild(wrap)
})
shell.appendChild(meta); page.appendChild(content); shell.appendChild(page); container.appendChild(shell)
})
}
function appendLine(parent,text,cls=''){ if(text===undefined||text===null) return; const l=document.createElement('div'); l.className='script-line '+cls; l.textContent=text; parent.appendChild(l)}
function openSceneModal(mode,id=null){
editingMode=mode
modalScene=mode==='edit'?clone(state.scenes.find(s=>s.id===id)):{id:uid(),heading:{type:'INT.',location:'LOCATION',time:'DAY'},description:'',blocks:[]}
document.getElementById('modalTitle').textContent=mode==='edit'?'Editar escena':'Agregar escena'
document.getElementById('modal').style.display='flex'
renderModal()
}
function closeModal(){document.getElementById('modal').style.display='none'; modalScene=null}
function renderModal(){
const body=document.getElementById('modalBody'); body.innerHTML=''
const h=document.createElement('div'); h.className='section'
h.innerHTML=`<div class="section-title">Encabezado</div><div class="help">Define dónde y cuándo ocurre la escena.</div><div class="grid3"><select id="mType"></select><input id="mLoc" class="field" placeholder="Escribe el lugar de la escena en inglés (ej: APARTMENT, CITY STREET)" value="${escapeHtml(modalScene.heading.location)}"><select id="mTime"></select></div><div class="inline-help"><strong>Ejemplo:</strong> EXT. CITY STREET - NIGHT</div>`
body.appendChild(h)
const typeSel=h.querySelector('#mType'); HEADING_TYPES.forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v;o.selected=v===modalScene.heading.type;typeSel.appendChild(o)})
typeSel.onchange=e=>modalScene.heading.type=e.target.value
const timeSel=h.querySelector('#mTime'); TIMES.forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v;o.selected=v===modalScene.heading.time;timeSel.appendChild(o)})
timeSel.onchange=e=>modalScene.heading.time=e.target.value
h.querySelector('#mLoc').oninput=e=>modalScene.heading.location=e.target.value.toUpperCase()

const d=document.createElement('div'); d.className='section'
d.innerHTML=`<div class="section-title">Descripción</div><div class="help">Describe el ambiente inicial. Solo lo que se puede ver u oír.</div><textarea id="mDesc" placeholder="Describe en inglés el ambiente o situación inicial de la escena.">${escapeHtml(modalScene.description)}</textarea>`
d.querySelector('#mDesc').oninput=e=>modalScene.description=e.target.value
body.appendChild(d)

const blocks=document.createElement('div'); blocks.className='section'; blocks.innerHTML=`<div class="section-title">Bloques</div><div class="help">Agrega acciones, personajes, diálogos, acotaciones y transiciones.</div>`
modalScene.blocks.forEach((b,index)=>blocks.appendChild(renderBlock(b,index)))
const add=document.createElement('div'); add.innerHTML=`<button onclick="addBlock('action')">+ Acción</button> <button onclick="addBlock('character')">+ Personaje</button> <button onclick="addBlock('dialogue')">+ Diálogo</button> <button onclick="addBlock('parenthetical')">+ Acotación</button> <button onclick="addBlock('transition')">+ Transición</button>`
blocks.appendChild(add)
body.appendChild(blocks)
}
function renderBlock(b,index){
const el=document.createElement('div'); el.className='block'
const header=document.createElement('div'); header.style.display='flex'; header.style.justifyContent='space-between'; header.style.alignItems='center'; header.style.gap='8px'
const title=document.createElement('div'); title.innerHTML=`<strong>${labelFor(b.type)}</strong><div class="inline-help">${helpFor(b.type)}</div>`
const actions=document.createElement('div'); actions.style.display='flex'; actions.style.gap='6px'
actions.appendChild(miniBtn('↑',()=>moveModalBlock(index,-1)))
actions.appendChild(miniBtn('↓',()=>moveModalBlock(index,1)))
actions.appendChild(miniBtn('Eliminar',()=>deleteModalBlock(index)))
header.appendChild(title); header.appendChild(actions); el.appendChild(header)
if(b.type==='action'){
el.innerHTML+=`<textarea placeholder="Describe en inglés lo que ocurre en pantalla. Ej: John opens the door and steps inside.">${escapeHtml(b.text||'')}</textarea><div class="inline-help"><strong>Tip:</strong> escribe solo lo visible. No pensamientos internos.</div>`
el.querySelector('textarea').oninput=e=>b.text=e.target.value
}
if(b.type==='character'){
const nameId='n'+uid(), selId='s'+uid(), sugId='g'+uid()
el.innerHTML+=`<input id="${nameId}" class="field" placeholder="Escribe el nombre del personaje en inglés (ej: JOHN, SARAH)" value="${escapeHtml(b.name||'')}"><select id="${selId}"></select><div class="inline-help">Opciones contextualizadas: solo aparecen sufijos válidos para personaje.</div><div id="${sugId}" class="suggestions"></div>`
const input=el.querySelector('#'+nameId)
input.oninput=e=>{b.name=e.target.value.toUpperCase(); renderCharacterSuggestions(sugId,b.id,b.name,(selected)=>{b.name=selected; renderModal()})}
const sel=el.querySelector('#'+selId)
CHARACTER_SUFFIXES.forEach(opt=>{const o=document.createElement('option');o.value=opt.v;o.textContent=`${opt.v||'none'} — ${opt.d}`;o.selected=opt.v===(b.suffix||'');sel.appendChild(o)})
sel.onchange=e=>b.suffix=e.target.value
renderCharacterSuggestions(sugId,b.id,b.name,(selected)=>{b.name=selected; renderModal()})
}
if(b.type==='dialogue'){
el.innerHTML+=`<textarea placeholder="Escribe en inglés lo que dice el personaje. Ej: I shouldn't be here.">${escapeHtml(b.text||'')}</textarea><div class="inline-help"><strong>Ejemplo:</strong> I told you this would happen.</div>`
el.querySelector('textarea').oninput=e=>b.text=e.target.value
}
if(b.type==='parenthetical'){
el.innerHTML+=`<textarea placeholder="Escribe una acotación breve en inglés. Ej: (whispering), (angry)">${escapeHtml(b.text||'')}</textarea><div class="inline-help"><strong>Tip:</strong> úsala con moderación y solo para indicar cómo se dice la línea.</div>`
el.querySelector('textarea').oninput=e=>b.text=e.target.value
}
if(b.type==='transition'){
const sid='t'+uid()
el.innerHTML+=`<select id="${sid}"></select><div class="inline-help">Solo aparecen transiciones. Cada opción incluye un ejemplo de uso.</div>`
const sel=el.querySelector('#'+sid)
TRANSITIONS.forEach(opt=>{const o=document.createElement('option');o.value=opt.v;o.textContent=`${opt.v} — ${opt.d}`;o.selected=opt.v===(b.value||'');sel.appendChild(o)})
sel.onchange=e=>b.value=e.target.value
}
return el
}
function labelFor(t){return({action:'Acción',character:'Personaje',dialogue:'Diálogo',parenthetical:'Acotación',transition:'Transición'})[t]}
function helpFor(t){return({action:'Describe lo que se ve en pantalla.',character:'Identifica quién habla y permite autocompletar nombres ya usados.',dialogue:'Contiene lo que dice el personaje.',parenthetical:'Indica cómo se dice una línea.',transition:'Marca el cambio entre escenas.'})[t]}
function renderCharacterSuggestions(containerId,excludeBlockId,currentValue,onSelect){
const box=document.getElementById(containerId); if(!box)return; box.innerHTML=''
const names=collectCharacterNames(excludeBlockId).filter(n=>!currentValue||n.includes(currentValue.toUpperCase())).slice(0,6)
if(!names.length) return
names.forEach(name=>{const chip=document.createElement('button'); chip.type='button'; chip.className='suggestion-chip'; chip.textContent=name; chip.onclick=()=>onSelect(name); box.appendChild(chip)})
}
function addBlock(type){const b={id:uid(),type}; if(type==='action'||type==='dialogue'||type==='parenthetical')b.text=''; if(type==='character'){b.name='';b.suffix=''} if(type==='transition')b.value='CUT TO:'; modalScene.blocks.push(b); renderModal()}
function moveModalBlock(index,dir){const j=index+dir; if(j<0||j>=modalScene.blocks.length)return; [modalScene.blocks[index],modalScene.blocks[j]]=[modalScene.blocks[j],modalScene.blocks[index]]; renderModal()}
function deleteModalBlock(index){modalScene.blocks.splice(index,1); renderModal()}
function saveScene(){
const idx=state.scenes.findIndex(s=>s.id===modalScene.id)
if(idx>=0) state.scenes[idx]=clone(modalScene)
else state.scenes.push(clone(modalScene))
closeModal(); render()
}
function renderGlossary(){const g=document.getElementById('glossary'); g.innerHTML=''; GLOSSARY.forEach(item=>{const d=document.createElement('div'); d.className='g-item'; d.textContent=item; g.appendChild(d)})}
function exportTXT(){let out=''; state.scenes.forEach((s,i)=>{out+=`${i+1}. ${headingString(s)}\n\n`; out+=(s.description||'')+'\n\n'; s.blocks.forEach(b=>{if(b.type==='action')out+=(b.text||'')+'\n'; if(b.type==='character')out+=([b.name,b.suffix].filter(Boolean).join(' '))+'\n'; if(b.type==='dialogue')out+=(b.text||'')+'\n'; if(b.type==='parenthetical')out+=(b.text||'')+'\n'; if(b.type==='transition')out+=(b.value||'')+'\n'}); out+='\n'})
const blob=new Blob([out]); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='script.txt'; a.click()}
function escapeHtml(value){return String(value??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;')}
newDocument()
</script>
</body>
</html>
