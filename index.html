<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Script Maker for Creative Dummies</title>
<style>
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#e5e7eb}
button,input,textarea,select{font:inherit}
button{border:1px solid #d1d5db;background:white;padding:8px 12px;border-radius:10px;cursor:pointer}
button:hover{background:#f3f4f6}
button.primary{background:#111827;color:white;border-color:#111827}

.topbar{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;background:#111827;color:white}
.workspace{display:grid;grid-template-columns:240px 1fr 260px;gap:16px;padding:16px}
.panel{background:white;border-radius:12px;border:1px solid #d1d5db;padding:14px}

.canvas-wrap{display:flex;justify-content:center}
.page{width:8.5in;background:white;min-height:11in;padding-top:1in;padding-right:1in;padding-bottom:1in;padding-left:1.5in;box-shadow:0 20px 40px rgba(0,0,0,.15)}
.page-content{font-family:"Courier New",monospace;font-size:12pt;line-height:1.2}

.script-line{margin-bottom:.12in;white-space:pre-wrap}
.sp-heading{text-transform:uppercase;font-weight:bold}
.sp-character{text-transform:uppercase;margin-left:2.2in}
.sp-dialogue{margin-left:1.2in;width:3.5in}
.sp-parenthetical{margin-left:1.7in}
.sp-transition{text-transform:uppercase;text-align:right;margin-left:4in}

.scene-block{position:relative;margin-bottom:.3in}
.scene-block:hover{background:#eef2ff}

.scene-hover{position:absolute;right:-120px;top:0;display:none;flex-direction:column;gap:6px}
.scene-block:hover .scene-hover{display:flex}
.scene-hover button{font-size:11px}

.add-scene{border:2px dashed #cbd5e1;padding:14px;text-align:center;margin-top:10px;cursor:pointer}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center}
.modal{background:white;width:900px;max-height:90vh;overflow:auto;border-radius:14px;padding:20px}
.section{margin-bottom:18px}
.section-title{font-weight:bold;margin-bottom:6px}
.help{font-size:12px;color:#6b7280;margin-bottom:8px}
.block{border:1px solid #d1d5db;border-radius:10px;padding:10px;margin-bottom:10px}
</style>
</head>
<body>

<header class="topbar">
<div>
<strong>Script Maker for Creative Dummies</strong><br>
<small>Editor visual sobre página de guion</small>
</div>
<div>
<button onclick="newDocument()">Nuevo</button>
<button onclick="openSceneModal('new')">Agregar escena</button>
<button onclick="exportTXT()">Exportar TXT</button>
<button onclick="window.print()">PDF</button>
</div>
</header>

<main class="workspace">

<section class="panel">
<h3>Escenas</h3>
<div id="sceneList"></div>
<button class="primary" onclick="openSceneModal('new')">+ Nueva escena</button>
</section>

<section class="canvas-wrap">
<div class="page">
<div id="pageContent" class="page-content"></div>
</div>
</section>

<section class="panel">
<h3>Glosario</h3>
<p style="font-size:12px;color:#6b7280">Lista completa de abreviaturas para aprender.</p>
<div id="glossary"></div>
</section>

</main>

<div id="modal" class="modal-overlay">
<div class="modal">
<h2 id="modalTitle">Editar escena</h2>
<div id="modalBody"></div>
<div style="margin-top:12px">
<button onclick="closeModal()">Cancelar</button>
<button class="primary" onclick="saveScene()">Guardar escena</button>
</div>
</div>
</div>

<script>

const HEADING_TYPES=["INT.","EXT.","INT./EXT."]
const TIMES=["DAY","NIGHT","MORNING","EVENING","CONTINUOUS"]

const CHARACTER_SUFFIXES=[
{v:"",d:"sin sufijo"},
{v:"(V.O.)",d:"voz en off"},
{v:"(O.S.)",d:"fuera de pantalla"},
{v:"(CONT'D)",d:"continúa hablando"}
]

const TRANSITIONS=[
{v:"CUT TO:",d:"corte directo"},
{v:"DISSOLVE TO:",d:"disolvencia"},
{v:"SMASH CUT TO:",d:"corte abrupto"},
{v:"FADE IN:",d:"inicio de guion"},
{v:"FADE OUT.",d:"fin de guion"}
]

let state={scenes:[]}
let modalScene=null

function uid(){return Math.random().toString(36).slice(2)}

function newDocument(){
state.scenes=[{
id:uid(),
heading:{type:"EXT.",location:"CITY STREET",time:"NIGHT"},
description:"The street is empty.",
blocks:[
{id:uid(),type:"action",text:"John walks into the street."},
{id:uid(),type:"character",name:"JOHN",suffix:""},
{id:uid(),type:"dialogue",text:"I shouldn't be here."}
]
}]
render()
}

function headingString(s){
return `${s.heading.type} ${s.heading.location} - ${s.heading.time}`
}

function render(){
renderScenes()
renderPaper()
renderGlossary()
}

function renderScenes(){
const el=document.getElementById("sceneList")
el.innerHTML=""
state.scenes.forEach((s,i)=>{
const d=document.createElement("div")
d.style.marginBottom="8px"
d.innerHTML=`${i+1}. ${headingString(s)}`
d.onclick=()=>openSceneModal("edit",s.id)
el.appendChild(d)
})
}

function renderPaper(){
const page=document.getElementById("pageContent")
page.innerHTML=""

state.scenes.forEach((scene,i)=>{
const wrap=document.createElement("div")
wrap.className="scene-block"

const hover=document.createElement("div")
hover.className="scene-hover"

const edit=document.createElement("button")
edit.textContent="Editar"
edit.onclick=()=>openSceneModal("edit",scene.id)

hover.appendChild(edit)
wrap.appendChild(hover)

appendLine(wrap,headingString(scene),"sp-heading")
appendLine(wrap,scene.description)

scene.blocks.forEach(b=>{
if(b.type==="action")appendLine(wrap,b.text)
if(b.type==="character")appendLine(wrap,`${b.name} ${b.suffix}`,"sp-character")
if(b.type==="dialogue")appendLine(wrap,b.text,"sp-dialogue")
if(b.type==="parenthetical")appendLine(wrap,b.text,"sp-parenthetical")
if(b.type==="transition")appendLine(wrap,b.value,"sp-transition")
})

if(i===state.scenes.length-1){
const add=document.createElement("div")
add.className="add-scene"
add.innerHTML="+ Agregar escena"
add.onclick=()=>openSceneModal("new")
wrap.appendChild(add)
}

page.appendChild(wrap)
})
}

function appendLine(parent,text,cls=""){
const l=document.createElement("div")
l.className="script-line "+cls
l.textContent=text
parent.appendChild(l)
}

function openSceneModal(mode,id=null){
modalScene=mode==="edit"?
JSON.parse(JSON.stringify(state.scenes.find(s=>s.id===id))):
{id:uid(),heading:{type:"INT.",location:"LOCATION",time:"DAY"},description:"",blocks:[]}

document.getElementById("modal").style.display="flex"
renderModal()
}

function closeModal(){document.getElementById("modal").style.display="none"}

function renderModal(){
const body=document.getElementById("modalBody")
body.innerHTML=""

const h=document.createElement("div")
h.className="section"
h.innerHTML=`
<div class="section-title">Encabezado</div>
<div class="help">Define dónde y cuándo ocurre la escena.</div>
<select id="mType"></select>
<input id="mLoc" value="${modalScene.heading.location}">
<select id="mTime"></select>
`
body.appendChild(h)

const typeSel=h.querySelector("#mType")
HEADING_TYPES.forEach(v=>{
const o=document.createElement("option")
o.value=v;o.textContent=v
o.selected=v===modalScene.heading.type
typeSel.appendChild(o)
})

const timeSel=h.querySelector("#mTime")
TIMES.forEach(v=>{
const o=document.createElement("option")
o.value=v;o.textContent=v
o.selected=v===modalScene.heading.time
timeSel.appendChild(o)
})

const desc=document.createElement("div")
desc.className="section"
desc.innerHTML=`
<div class="section-title">Descripción</div>
<textarea id="mDesc" style="width:100%;height:80px">${modalScene.description}</textarea>
`
body.appendChild(desc)

const blocks=document.createElement("div")
blocks.className="section"
blocks.innerHTML=`<div class="section-title">Bloques</div>`

modalScene.blocks.forEach(b=>{
const el=document.createElement("div")
el.className="block"

if(b.type==="action"){
el.innerHTML=`Acción<br><textarea style="width:100%">${b.text}</textarea>`
}

if(b.type==="character"){
let opts=""
CHARACTER_SUFFIXES.forEach(s=>{
opts+=`<option value="${s.v}" ${b.suffix===s.v?"selected":""}>${s.v} — ${s.d}</option>`
})

el.innerHTML=`
Personaje<br>
<input value="${b.name}"><br>
<select>${opts}</select>
`
}

if(b.type==="dialogue"){
el.innerHTML=`Diálogo<br><textarea style="width:100%">${b.text}</textarea>`
}

if(b.type==="parenthetical"){
el.innerHTML=`Acotación<br><textarea style="width:100%">${b.text}</textarea>`
}

if(b.type==="transition"){
let opts=""
TRANSITIONS.forEach(t=>{
opts+=`<option value="${t.v}">${t.v} — ${t.d}</option>`
})

el.innerHTML=`Transición<br><select>${opts}</select>`
}

blocks.appendChild(el)
})

const add=document.createElement("div")
add.innerHTML=`
<button onclick="addBlock('action')">+ Acción</button>
<button onclick="addBlock('character')">+ Personaje</button>
<button onclick="addBlock('dialogue')">+ Diálogo</button>
<button onclick="addBlock('parenthetical')">+ Acotación</button>
<button onclick="addBlock('transition')">+ Transición</button>
`
blocks.appendChild(add)

body.appendChild(blocks)
}

function addBlock(type){
const b={id:uid(),type:type}
if(type==="action"||type==="dialogue"||type==="parenthetical")b.text=""
if(type==="character"){b.name="CHARACTER";b.suffix=""}
if(type==="transition")b.value="CUT TO:"
modalScene.blocks.push(b)
renderModal()
}

function saveScene(){
const existing=state.scenes.findIndex(s=>s.id===modalScene.id)
if(existing>=0)state.scenes[existing]=modalScene
else state.scenes.push(modalScene)
closeModal()
render()
}

function renderGlossary(){
const g=document.getElementById("glossary")
g.innerHTML=`
INT. — interior<br>
EXT. — exterior<br>
(V.O.) — voz en off<br>
(O.S.) — fuera de pantalla<br>
CUT TO — corte directo
`
}

function exportTXT(){
let out=""
state.scenes.forEach(s=>{
out+=headingString(s)+"\n\n"
out+=s.description+"\n\n"
s.blocks.forEach(b=>{
if(b.type==="action")out+=b.text+"\n"
if(b.type==="character")out+=`${b.name} ${b.suffix}\n`
if(b.type==="dialogue")out+=b.text+"\n"
if(b.type==="transition")out+=b.value+"\n"
})
out+="\n"
})

const blob=new Blob([out])
const a=document.createElement("a")
a.href=URL.createObjectURL(blob)
a.download="script.txt"
a.click()
}

newDocument()

</script>
</body>
</html>
