<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Script Maker for Creative Dummies</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="print.css" media="print" />
</head>
<body>
  <header class="topbar">
    <div>
      <strong>Script Maker for Creative Dummies</strong><br />
      <small>Editor visual de guiones</small>
    </div>

    <div class="toolbar">
      <div class="toolbar-group">
        <button onclick="handleNewScript()">Nuevo</button>
        <button onclick="openLibraryModal()">Mis guiones</button>
      </div>

      <div class="toolbar-title" id="topbarScriptTitle">Sin título</div>

      <div class="toolbar-group">
        <button id="writingModeBtn" class="toggle-off" onclick="toggleWritingMode()">✍️ Focus</button>

        <div class="menu-wrap">
          <button id="exportMenuBtn" onclick="toggleExportMenu()">Exportar ▾</button>
          <div id="exportMenu" class="menu-dropdown">
            <button onclick="exportTXT()">Exportar TXT</button>
            <button onclick="window.print()">Exportar PDF</button>
            <button onclick="exportCurrentScriptJSON()">Exportar guion JSON</button>
            <button onclick="exportLibraryJSON()">Exportar biblioteca JSON</button>
          </div>
        </div>
      </div>
    </div>

  </header>

  <main class="workspace">
    <section class="panel">
      <h3>Escenas</h3>
      <p class="muted">Numeración automática y acceso rápido.</p>
      <div id="saveStatus" class="status-line">Cargando…</div>
      <div id="sceneList"></div>
      <button class="primary" onclick="openSceneModal('new')">+ Agregar escena</button>
    </section>

    <section class="canvas-wrap">
      <div id="pagesContainer"></div>
    </section>

    <section class="panel">
      <h3>Glosario</h3>
      <p class="muted">
        Tus guiones se guardan localmente en este navegador. Exporta una copia de seguridad desde “Mis guiones”.
      </p>
      <div id="glossary"></div>
    </section>
  </main>

  <div id="libraryModal" class="modal-overlay">
    <div class="modal large">
      <h2>Mis guiones</h2>
      <div class="modal-toolbar">
        <button class="primary" onclick="handleNewScript()">+ Nuevo guion</button>
        <button onclick="exportLibraryJSON()">Exportar biblioteca</button>
        <button onclick="document.getElementById('importLibraryInput').click()">Importar biblioteca</button>
        <input id="importLibraryInput" type="file" accept=".json,application/json" hidden />
      </div>
      <div id="libraryList" class="library-list"></div>
      <div class="modal-actions">
        <button onclick="closeLibraryModal()">Cerrar</button>
      </div>
    </div>
  </div>

  <div id="projectModal" class="modal-overlay">
    <div class="modal">
      <h2 id="projectModalTitle">Proyecto</h2>
      <div id="projectModalBody"></div>
      <div class="modal-actions">
        <div></div>
        <div>
          <button onclick="closeProjectModal()">Cancelar</button>
          <button class="primary" onclick="saveProjectModal()">Guardar</button>
        </div>
      </div>
    </div>
  </div>

  <div id="sceneModal" class="modal-overlay">
    <div class="modal large">
      <h2 id="sceneModalTitle">Editar escena</h2>
      <div id="sceneModalBody"></div>
      <div class="modal-actions">
        <div></div>
        <div>
          <button onclick="closeSceneModal()">Cancelar</button>
          <button class="primary" onclick="saveSceneModal()">Guardar escena</button>
        </div>
      </div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="db.js"></script>
  <script src="app.js"></script>
</body>
</html>
