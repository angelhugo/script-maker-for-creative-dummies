<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Script Maker for Creative Dummies</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="print.css" media="print" />
</head>
<body>
  <header class="topbar">
    <div>
      <strong>Script Maker for Creative Dummies</strong><br />
      <small>Editor visual sobre página de guion</small>
    </div>
    <div class="toolbar">
      <button onclick="newDocument()">Nuevo</button>
      <button id="writingModeBtn" class="toggle-off" onclick="toggleWritingMode()">Modo escritura: OFF</button>
      <button onclick="exportTXT()">Exportar TXT</button>
      <button onclick="window.print()">PDF</button>
    </div>
  </header>

  <main class="workspace">
    <section class="panel">
      <h3>Escenas</h3>
      <p class="muted">Numeración automática y acceso rápido.</p>
      <div id="sceneList"></div>
      <button class="primary" onclick="openSceneModal('new')">+ Agregar escena</button>
    </section>

    <section class="canvas-wrap">
      <div id="pagesContainer"></div>
    </section>

    <section class="panel">
      <h3>Glosario</h3>
      <p class="muted">Lista completa de abreviaturas para aprender.</p>
      <div id="glossary"></div>
    </section>
  </main>

  <div id="modal" class="modal-overlay">
    <div class="modal">
      <h2 id="modalTitle">Editar escena</h2>
      <div id="modalBody"></div>
      <div class="modal-actions">
        <button onclick="closeModal()">Cancelar</button>
        <button class="primary" onclick="saveScene()">Guardar escena</button>
      </div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
